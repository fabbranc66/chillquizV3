<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StemPad Preview</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="skin">
    <section class="deck deck-left">
      <div class="topline blue"></div>
      <div class="track-meta left">
        <span>Trascina un brano in questo lettore per caricarlo</span>
        <strong>120</strong>
        <span>BPM</span>
      </div>
      <div class="deck-grid">
        <div class="pad-column">
          <div class="pad green"></div>
          <div class="pad pink"></div>
          <div class="pad green"></div>
          <div class="pad green"></div>
          <div class="pad green"></div>
          <div class="pad green"></div>
          <div class="pad green icon">mic</div>
        </div>
        <div class="pad-column">
          <div class="pad yellow"></div>
          <div class="pad pink"></div>
          <div class="pad yellow"></div>
          <div class="pad yellow"></div>
          <div class="pad yellow"></div>
          <div class="pad yellow"></div>
          <div class="pad yellow icon">keys</div>
        </div>
        <div class="pad-column">
          <div class="pad blue"></div>
          <div class="pad pink"></div>
          <div class="pad blue"></div>
          <div class="pad blue"></div>
          <div class="pad blue"></div>
          <div class="pad blue"></div>
          <div class="pad blue icon">drum</div>
        </div>
        <div class="fx-zone">
          <h2>stems FX</h2>
          <div class="stem-icons">
            <button class="mini violet">mic</button>
            <button class="mini violet">keys</button>
            <button class="mini violet">drum</button>
          </div>
          <h2>FX</h2>
          <div class="fx-buttons">
            <button>ECHO 0.5</button>
            <button>HP 8</button>
            <button>ECHO 1</button>
            <button>HP 8</button>
            <button>ECHO 2</button>
            <button>CHOP</button>
            <button>ROOM</button>
            <button>LOOP OUT</button>
          </div>
        </div>
      </div>
    </section>

    <section class="center">
      <div class="curve">
        <h2>cf curve</h2>
        <div class="curve-buttons">
          <button class="pink">smooth</button>
          <button class="green">log</button>
          <button class="green">scratch</button>
        </div>
      </div>
      <div class="meters">
        <div class="meter-group">
          <div class="leds"></div>
          <div class="leds"></div>
          <div class="slider blue"></div>
          <div class="labels cyan">
            <span>100</span>
            <span>300</span>
            <span>500 ms</span>
            <strong>0</strong>
          </div>
        </div>
        <div class="meter-group">
          <div class="slider magenta"></div>
          <div class="leds"></div>
          <div class="leds"></div>
          <div class="labels red">
            <span>500 ms</span>
            <strong>0</strong>
          </div>
        </div>
      </div>
    </section>

    <section class="deck deck-right">
      <div class="topline red"></div>
      <div class="track-meta right">
        <span>Trascina un brano in questo lettore per caricarlo</span>
        <strong>120</strong>
        <span>BPM</span>
      </div>
      <div class="deck-grid reverse">
        <div class="fx-zone">
          <h2>stems FX</h2>
          <div class="stem-icons">
            <button class="mini violet">mic</button>
            <button class="mini violet">keys</button>
            <button class="mini violet">drum</button>
          </div>
          <h2>FX</h2>
          <div class="fx-buttons">
            <button>HP 8</button>
            <button>ECHO 0.5</button>
            <button>HP 8</button>
            <button>ECHO 1</button>
            <button>ECHO 2</button>
            <button>CHOP</button>
            <button>ROOM</button>
            <button>LOOP OUT</button>
          </div>
        </div>
        <div class="pad-column">
          <div class="pad green"></div>
          <div class="pad pink"></div>
          <div class="pad green"></div>
          <div class="pad green"></div>
          <div class="pad green"></div>
          <div class="pad green"></div>
          <div class="pad green icon">mic</div>
        </div>
        <div class="pad-column">
          <div class="pad yellow"></div>
          <div class="pad pink"></div>
          <div class="pad yellow"></div>
          <div class="pad yellow"></div>
          <div class="pad yellow"></div>
          <div class="pad yellow"></div>
          <div class="pad yellow icon">keys</div>
        </div>
        <div class="pad-column">
          <div class="pad blue"></div>
          <div class="pad pink"></div>
          <div class="pad blue"></div>
          <div class="pad blue"></div>
          <div class="pad blue"></div>
          <div class="pad blue"></div>
          <div class="pad blue icon">drum</div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
